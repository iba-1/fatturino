name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: |
            node_modules
            apps/*/node_modules
            apps/*/dist
            packages/*/node_modules
            packages/*/dist
          retention-days: 1

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - run: pnpm type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Run unit tests
        run: pnpm --filter @fatturino/web exec vitest run --reporter=verbose --reporter=json --outputFile=vitest-results.json

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: apps/web/vitest-results.json
          if-no-files-found: ignore

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [setup]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fatturino
          POSTGRES_PASSWORD: fatturino
          POSTGRES_DB: fatturino_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm ls @playwright/test --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Setup API env
        run: |
          cp apps/api/.env.example apps/api/.env
          sed -i 's|postgresql://fatturino:fatturino@localhost:5432/fatturino|postgresql://fatturino:fatturino@localhost:5432/fatturino_test|' apps/api/.env
          sed -i 's|change-me-to-a-random-secret|ci-test-secret-that-is-at-least-32-characters-long|' apps/api/.env
          if [ -n "$RESEND_API_KEY" ]; then
            sed -i "s|^RESEND_API_KEY=.*|RESEND_API_KEY=${RESEND_API_KEY}|" apps/api/.env
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Push DB schema
        run: pnpm db:push

      - name: Run E2E tests
        run: pnpm exec playwright test --reporter=list,json
        env:
          CI: true
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: playwright-results.json
          if-no-files-found: ignore

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fatturino-ci .

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
        continue-on-error: true

      - name: Post test summary comment
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
        with:
          script: |
            const fs = require('fs')

            const statusIcon = (result) => result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️'

            // Strip ANSI escape codes and trim to a max number of lines
            const cleanError = (msg, maxLines = 15) =>
              msg.replace(/\x1b\[[0-9;]*m/g, '').trim().split('\n').slice(0, maxLines).join('\n')

            // --- Unit tests ---
            let unitSummary = `${statusIcon(process.env.UNIT_RESULT)} ${process.env.UNIT_RESULT}`
            let unitDetails = ''
            try {
              const unit = JSON.parse(fs.readFileSync('vitest-results.json', 'utf8'))
              const passed = unit.numPassedTests ?? 0
              const failed = unit.numFailedTests ?? 0
              const total  = unit.numTotalTests  ?? 0
              const ms = (unit.testResults ?? [])
                .reduce((sum, s) => sum + ((s.endTime ?? 0) - (s.startTime ?? 0)), 0)
              unitSummary = `${statusIcon(process.env.UNIT_RESULT)} ${passed}/${total} passed in ${(ms / 1000).toFixed(2)}s`
              unitDetails = (unit.testResults ?? []).map(suite => {
                const file = suite.testFilePath.replace(/.*__tests__\//, '')
                const rows = (suite.testResults ?? []).map(t => {
                  const icon = t.status === 'passed' ? '✅' : '❌'
                  let line = `  ${icon} ${t.title} *(${t.duration}ms)*`
                  if (t.status === 'failed' && t.failureMessages?.length) {
                    const msg = cleanError(t.failureMessages.join('\n---\n'))
                    line += `\n  <details><summary>Show error</summary>\n\n  \`\`\`\n${msg}\n  \`\`\`\n\n  </details>`
                  }
                  return line
                }).join('\n')
                return `**${file}**\n${rows}`
              }).join('\n\n')
            } catch (_) {}

            // --- E2E tests ---
            let e2eSummary = `${statusIcon(process.env.E2E_RESULT)} ${process.env.E2E_RESULT}`
            let e2eDetails = ''
            try {
              const e2e = JSON.parse(fs.readFileSync('playwright-results.json', 'utf8'))
              const stats   = e2e.stats ?? {}
              const passed  = stats.expected   ?? 0
              const failed  = stats.unexpected ?? 0
              const skipped = stats.skipped    ?? 0
              const total   = passed + failed + skipped
              e2eSummary = `${statusIcon(process.env.E2E_RESULT)} ${passed}/${total} passed in ${((stats.duration ?? 0) / 1000).toFixed(2)}s`
              const flatten = (suites) => suites.flatMap(s => [s, ...flatten(s.suites ?? [])])
              e2eDetails = flatten(e2e.suites ?? [])
                .filter(s => (s.specs ?? []).length > 0)
                .map(suite => {
                  const rows = (suite.specs ?? []).map(spec => {
                    const result = spec.tests?.[0]?.results?.[0]
                    const ok     = result?.status === 'passed'
                    let line = `  ${ok ? '✅' : '❌'} ${spec.title}`
                    if (!ok && result?.errors?.length) {
                      const msg = cleanError(
                        result.errors.map(e => e.message || e.stack || '').join('\n---\n')
                      )
                      if (msg) {
                        line += `\n  <details><summary>Show error</summary>\n\n  \`\`\`\n${msg}\n  \`\`\`\n\n  </details>`
                      }
                    }
                    return line
                  }).join('\n')
                  return `**${suite.title}**\n${rows}`
                }).join('\n\n')
            } catch (_) {}

            const unitOpen = process.env.UNIT_RESULT === 'failure' ? ' open' : ''
            const e2eOpen  = process.env.E2E_RESULT  === 'failure' ? ' open' : ''

            const body = [
              '## 🧪 Test Results',
              '',
              '| Suite | Result |',
              '|-------|--------|',
              `| Unit Tests | ${unitSummary} |`,
              `| E2E Tests | ${e2eSummary} |`,
              '',
              `<details${unitOpen}>`,
              '<summary>Unit test details</summary>',
              '',
              unitDetails || '_No details available_',
              '',
              '</details>',
              '',
              `<details${e2eOpen}>`,
              '<summary>E2E test details</summary>',
              '',
              e2eDetails || '_No details available_',
              '',
              '</details>',
              '',
              `> Run [#${process.env.RUN_NUMBER}](${process.env.RUN_URL})`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('## 🧪 Test Results'))
            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
