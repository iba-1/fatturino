services:
  postgres:
    image: postgres:16-alpine
    container_name: fatturino-db
    environment:
      POSTGRES_USER: fatturino
      POSTGRES_PASSWORD: fatturino
      POSTGRES_DB: fatturino
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatturino"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
